options {
    allow-transfer { none; };
    directory "/srv/named/db";
    key-directory "/run/named";
    hostname none;
    listen-on { 127.0.0.1; };
    pid-file "/run/named/named.pid";
    rate-limit {
        responses-per-second 5;
        window 5;
    };
    recursion no;
    version "none";
};
controls {
};
logging {
    category lame-servers { null; };
};
include "/srv/named/db/zones.conf";
