---
default:
  base_os:
    volume_groups: {}
  base_users:
    add:
      - vagrant
    spec:
      vagrant:
        uid: 1000
        email: vagrant@v1.radia.run
        want_shell: true
  bkp:
    ssh_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIB3mhGsrxFV4KnHjDtBaaU7ZdlNhwxIEPZ3/+Bv1xZY v1.radia.run"
  logrotate:
    on_calendar: "7:30"
  network:
    devices: {}
    trusted: {}
  rsconf: {}
  rsconf_db:
    host_run_d: /srv
    install_server: http://v1.radia.run:2916
    root_u: root
    run_u: vagrant
    run_uid: 1000
  systemd:
    timezone: America/Phoenix

channel:
  dev:
    network:
      trusted:
        10.10.10.0/24:
          gateway: 10.10.10.2
      untrusted: {}

host:
  dev:
    v1.radia.run:
      rsconf_db:
        components:
          - named

#Local Variables:
#mode:yaml
#End:
